privacy.hero.title=Política de Privacidad
privacy.hero.date=Última actualización: Abril 2026
privacy.s1.title=1. Sobre Dokkan Project
privacy.s1.text=Dokkan Project es un sitio web no oficial y sin fines de lucro dedicado a Dragon Ball Z Dokkan Battle. No estamos afiliados, respaldados ni conectados con Bandai Namco Entertainment Inc., Akatsuki Inc., ni ninguna de sus subsidiarias. Este sitio existe únicamente para proporcionar contenido informativo a la comunidad.
privacy.s2.title=2. Información que Recopilamos
privacy.s2.text=No recopilamos datos personales directamente. Cuando visitas Dokkan Project, los registros estándar del servidor pueden registrar automáticamente tu dirección IP, tipo de navegador y las páginas que visitas. Esta información se utiliza únicamente para diagnósticos técnicos y estabilidad del sitio. No vendemos, intercambiamos ni compartimos estos datos con terceros.
privacy.s3.title=3. Cookies
privacy.s3.text=Utilizamos un pequeño número de cookies técnicas para recordar tus preferencias (como el idioma seleccionado). Estas cookies no contienen información personal y no se utilizan para publicidad ni seguimiento. Puedes desactivar las cookies en la configuración de tu navegador en cualquier momento, aunque algunas funciones podrían no funcionar correctamente.
privacy.s4.title=4. Servicios de Terceros
privacy.s4.text=Los recursos del juego, imágenes de personajes y obras de arte mostradas en este sitio son propiedad de Bandai Namco Entertainment Inc. y Akatsuki Inc. Se utilizan bajo los principios del uso legítimo con fines informativos, no comerciales y de fans. Todas las marcas registradas mencionadas en este sitio siguen siendo propiedad de sus respectivos dueños.
privacy.s5.title=5. Seguridad de los Datos
privacy.s5.text=Dado que no recopilamos datos personales, no hay datos personales en riesgo. Implementamos medidas estándar de seguridad web para mantener el sitio estable y seguro de visitar.
privacy.s6.title=6. Privacidad de los Menores
privacy.s6.text=Dokkan Project es un sitio fan para audiencia general. No recopilamos conscientemente ninguna información personal de menores. Si crees que un menor ha proporcionado información personal, contáctanos para que podamos tomar las medidas adecuadas.
privacy.s7.title=7. Cambios en Esta Política
privacy.s7.text=Podemos actualizar esta Política de Privacidad de vez en cuando. Cualquier cambio se reflejará en esta página con una fecha actualizada. Te recomendamos revisar esta política periódicamente.
privacy.s8.title=8. Contacto
privacy.s8.text=Si tienes preguntas sobre esta Política de Privacidad o sobre cómo funciona el sitio, puedes comunicarte con nosotros a través de nuestros canales comunitarios. Somos un pequeño proyecto fan y haremos nuestro mejor esfuerzo para responder.

cookie.hero.title=Política de Cookies
cookie.hero.date=Última actualización: Abril 2026
cookie.s1.title=1. ¿Qué son las Cookies?
cookie.s1.text=Las cookies son pequeños archivos de texto almacenados en tu dispositivo cuando visitas un sitio web. Ayudan al sitio a recordar tus preferencias y proporcionan una experiencia más consistente entre visitas. Las cookies son ampliamente utilizadas y generalmente inofensivas.
cookie.s2.title=2. Cookies que Usamos
cookie.s2.text=Dokkan Project utiliza únicamente cookies técnicas esenciales para funcionar correctamente. Específicamente, almacenamos tu preferencia de idioma (inglés o español) para que no tengas que volver a seleccionarlo en cada visita. No se utilizan cookies publicitarias, de seguimiento ni de analítica en este sitio.
cookie.s3.title=3. Detalles de las Cookies
cookie.s3.col.name=Nombre
cookie.s3.col.purpose=Finalidad
cookie.s3.col.duration=Duración
cookie.s3.row1.name=dokkanLocale
cookie.s3.row1.purpose=Almacena el idioma elegido (en / es)
cookie.s3.row1.duration=Persistente
cookie.s3.row2.name=sap-language
cookie.s3.row2.purpose=Parámetro de sesión de idioma del framework UI5
cookie.s3.row2.duration=Sesión
cookie.s4.title=4. Cookies de Terceros
cookie.s4.text=No utilizamos cookies publicitarias, de redes sociales ni de analítica de terceros. Las imágenes de personajes y recursos se cargan desde fuentes CDN externas (como wikia.nocookie.net), que pueden establecer sus propias cookies sujetas a sus respectivas políticas. No tenemos control sobre el comportamiento de las cookies de terceros.
cookie.s5.title=5. Gestión de Cookies
cookie.s5.text=Puedes controlar o eliminar las cookies en cualquier momento a través de la configuración de tu navegador. Las instrucciones varían según el navegador: busca Privacidad, Seguridad o Cookies en el menú de configuración. Desactivar las cookies puede impedir que se guarde la preferencia de idioma entre sesiones, pero el sitio seguirá siendo completamente utilizable.
cookie.s6.title=6. Actualizaciones
cookie.s6.text=Esta Política de Cookies puede actualizarse para reflejar cambios en el sitio. Cualquier actualización se indicará con una fecha revisada en la parte superior de esta página.

terms.hero.title=Términos de Uso
terms.hero.date=Última actualización: Abril 2026
terms.s1.title=1. Aceptación de los Términos
terms.s1.text=Al acceder y utilizar Dokkan Project, aceptas estos Términos de Uso. Si no estás de acuerdo, por favor no utilices este sitio. Nos reservamos el derecho de modificar estos términos en cualquier momento, y tu uso continuado del sitio constituye la aceptación de cualquier cambio.
terms.s2.title=2. Aviso Legal Fan-Made
terms.s2.text=Dokkan Project es un sitio web no oficial creado por fans. No estamos afiliados, respaldados ni asociados con Bandai Namco Entertainment Inc., Akatsuki Inc. ni TOEI Animation. Dragon Ball Z Dokkan Battle, Dragon Ball Z y todos los personajes, nombres e imágenes relacionados son marcas registradas y derechos de autor de sus respectivos propietarios. Todo el contenido del juego mostrado en este sitio pertenece a los titulares de derechos originales.
terms.s3.title=3. Uso del Sitio
terms.s3.text=Dokkan Project se proporciona únicamente para uso personal, no comercial e informativo. Puedes navegar y utilizar la información de este sitio como referencia propia. No puedes reproducir, redistribuir ni explotar comercialmente ningún contenido de este sitio sin consentimiento previo por escrito. Este sitio no facilita compras dentro del juego ni transacciones de cuentas.
terms.s4.title=4. Propiedad Intelectual
terms.s4.text=El código, diseño y maquetación originales de Dokkan Project son obra de sus creadores. Los datos del juego, ilustraciones de personajes, iconos y recursos relacionados siguen siendo propiedad intelectual de Bandai Namco Entertainment Inc. y Akatsuki Inc. Estos recursos se utilizan aquí bajo principios de uso legítimo con fines no comerciales de fans.
terms.s5.title=5. Precisión de la Información
terms.s5.text=Nos esforzamos por mantener todos los datos de personajes, estadísticas e información lo más precisos y actualizados posible. Sin embargo, el contenido del juego cambia con frecuencia y no podemos garantizar que toda la información esté actualizada en un momento dado. Consulta siempre el juego oficial o las fuentes oficiales para obtener los datos más precisos.
terms.s6.title=6. Limitación de Responsabilidad
terms.s6.text=Dokkan Project se proporciona ´tal cual´, sin garantías de ningún tipo. No somos responsables de las decisiones tomadas basándose en la información encontrada en este sitio, de errores u omisiones en los datos, ni de interrupciones o cortes del servicio. Utiliza este sitio a tu propia discreción.
terms.s7.title=7. Enlaces Externos
terms.s7.text=Este sitio puede contener enlaces a sitios web o recursos externos. No somos responsables del contenido, las prácticas de privacidad ni la disponibilidad de esos sitios externos. Visitar enlaces externos se hace bajo tu propio riesgo.
terms.s8.title=8. Cambios en los Términos
terms.s8.text=Podemos revisar estos Términos de Uso de vez en cuando. Cualquier revisión se publicará en esta página con una fecha actualizada. Si continúas usando Dokkan Project después de publicar los cambios, aceptas los términos revisados.
terms.s9.title=9. Contacto
terms.s9.text=Para cualquier pregunta sobre estos Términos de Uso, o para reportar contenido incorrecto o problemas de propiedad intelectual, contáctanos a través de nuestros canales comunitarios. Tomamos todos los asuntos en serio y responderemos con prontitud.

