# ── Privacy Policy ────────────────────────────────────────────
privacy.hero.title=Privacy Policy
privacy.hero.date=Last updated: April 2026
privacy.s1.title=1. About Dokkan Project
privacy.s1.text=Dokkan Project is a fan-made, non-commercial website dedicated to Dragon Ball Z Dokkan Battle. We are not affiliated with, endorsed by, or connected to Bandai Namco Entertainment Inc., Akatsuki Inc., or any of their subsidiaries. This site exists solely to provide informational content for the community.
privacy.s2.title=2. Information We Collect
privacy.s2.text=We do not collect personal data directly. When you visit Dokkan Project, standard server logs may automatically record your IP address, browser type, and the pages you visit. This information is used only for technical diagnostics and site stability. We do not sell, trade, or share this data with third parties.
privacy.s3.title=3. Cookies
privacy.s3.text=We use a small number of technical cookies to remember your preferences (such as your selected language). These cookies do not contain personal information and are not used for advertising or tracking purposes. You can disable cookies in your browser settings at any time, although some features may not function as expected.
privacy.s4.title=4. Third-Party Services
privacy.s4.text=Game assets, character images, and artwork displayed on this site are the property of Bandai Namco Entertainment Inc. and Akatsuki Inc. These are used under the principles of fair use for informational, non-commercial, fan purposes. All trademarks and registered trademarks mentioned on this site remain the property of their respective owners.
privacy.s5.title=5. Data Security
privacy.s5.text=Since we do not collect personal data, there is no personal data at risk. We implement standard web security measures to keep the site stable and safe to visit.
privacy.s6.title=6. Children´s Privacy
privacy.s6.text=Dokkan Project is a general-audience fan site. We do not knowingly collect any personal information from children. If you believe a child has provided personal information, please contact us so we can take appropriate action.
privacy.s7.title=7. Changes to This Policy
privacy.s7.text=We may update this Privacy Policy from time to time. Any changes will be reflected on this page with an updated date. We encourage you to review this policy periodically.
privacy.s8.title=8. Contact
privacy.s8.text=If you have questions about this Privacy Policy or how the site operates, you can reach out to us through our community channels. We are a small fan project and will do our best to respond.

# ── Cookie Policy ─────────────────────────────────────────────
cookie.hero.title=Cookie Policy
cookie.hero.date=Last updated: April 2026
cookie.s1.title=1. What Are Cookies?
cookie.s1.text=Cookies are small text files stored on your device when you visit a website. They help the site remember your preferences and provide a more consistent experience across visits. Cookies are widely used and are generally harmless.
cookie.s2.title=2. Cookies We Use
cookie.s2.text=Dokkan Project uses only essential technical cookies to operate correctly. Specifically, we store your language preference (English or Spanish) so you do not have to re-select it every time you visit. No advertising cookies, tracking cookies, or analytics cookies are used on this site.
cookie.s3.title=3. Cookie Details
cookie.s3.col.name=Name
cookie.s3.col.purpose=Purpose
cookie.s3.col.duration=Duration
cookie.s3.row1.name=dokkanLocale
cookie.s3.row1.purpose=Stores your chosen language (en / es)
cookie.s3.row1.duration=Persistent
cookie.s3.row2.name=sap-language
cookie.s3.row2.purpose=UI5 framework language session parameter
cookie.s3.row2.duration=Session
cookie.s4.title=4. Third-Party Cookies
cookie.s4.text=We do not use any third-party advertising, social media, or analytics cookies. Character images and assets are loaded from external CDN sources (such as wikia.nocookie.net), which may set their own cookies subject to their respective policies. We have no control over third-party cookie behaviour.
cookie.s5.title=5. Managing Cookies
cookie.s5.text=You can control or delete cookies at any time through your browser settings. Instructions vary by browser — look for Privacy, Security, or Cookies in your browser´s settings menu. Disabling cookies may prevent the language preference from being saved between sessions, but the site will still be fully usable.
cookie.s6.title=6. Updates
cookie.s6.text=This Cookie Policy may be updated to reflect changes to the site. Any updates will be noted with a revised date at the top of this page.

terms.hero.title=Terms of Use
terms.hero.date=Last updated: April 2026
terms.s1.title=1. Acceptance of Terms
terms.s1.text=By accessing and using Dokkan Project, you agree to these Terms of Use. If you do not agree, please do not use this site. We reserve the right to modify these terms at any time, and your continued use of the site constitutes acceptance of any changes.
terms.s2.title=2. Fan-Made Disclaimer
terms.s2.text=Dokkan Project is an unofficial, fan-created website. We are not affiliated with, endorsed by, or partnered with Bandai Namco Entertainment Inc., Akatsuki Inc., or TOEI Animation. Dragon Ball Z Dokkan Battle, Dragon Ball Z, and all related characters, names, and imagery are trademarks and copyrights of their respective owners. All game content displayed on this site belongs to the original rights holders.
terms.s3.title=3. Use of the Site
terms.s3.text=Dokkan Project is provided for personal, non-commercial, informational use only. You may browse and use the information on this site for your own reference. You may not reproduce, redistribute, or commercially exploit any content from this site without prior written consent. This site does not facilitate any in-game purchases or account transactions.
terms.s4.title=4. Intellectual Property
terms.s4.text=The original code, design, and layout of Dokkan Project are the work of its creators. Game data, character artwork, icons, and related assets remain the intellectual property of Bandai Namco Entertainment Inc. and Akatsuki Inc. These assets are used here under fair-use principles for non-commercial fan purposes.
terms.s5.title=5. Accuracy of Information
terms.s5.text=We strive to keep all character data, stats, and information as accurate and up-to-date as possible. However, game content changes frequently and we cannot guarantee that all information is current at any given time. Always refer to the official game or official sources for the most accurate data.
terms.s6.title=6. Limitation of Liability
terms.s6.text=Dokkan Project is provided 'as is' without warranties of any kind. We are not responsible for any decisions made based on information found on this site, any errors or omissions in the data, or any interruptions or outages of the service. Use this site at your own discretion.
terms.s7.title=7. External Links
terms.s7.text=This site may contain links to external websites or resources. We are not responsible for the content, privacy practices, or availability of those external sites. Visiting external links is done at your own risk.
terms.s8.title=8. Changes to Terms
terms.s8.text=We may revise these Terms of Use from time to time. Any revisions will be posted on this page with an updated date. If you continue to use Dokkan Project after changes are posted, you accept the revised terms.
terms.s9.title=9. Contact
terms.s9.text=For any questions regarding these Terms of Use, or to report incorrect content or intellectual property concerns, please contact us through our community channels. We take all concerns seriously and will respond promptly.